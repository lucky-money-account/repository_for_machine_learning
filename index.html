<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的GitHub Pages主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6c63ff;
            --secondary-color: #4a44b5;
            --text-color: #333;
            --bg-color: #fff;
            --card-bg: #f9f9f9;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        .dark-mode {
            --primary-color: #8b85ff;
            --secondary-color: #6c63ff;
            --text-color: #f0f0f0;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: var(--transition);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏 */
        header {
            background-color: var(--bg-color);
            box-shadow: var(--shadow);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            color: var(--primary-color);
        }

        /* 主内容区 */
        section {
            padding: 100px 0;
        }

        .hero {
            display: flex;
            align-items: center;
            min-height: 100vh;
            padding-top: 80px;
        }

        .hero-content {
            flex: 1;
            padding-right: 30px;
        }

        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            border-radius: 50%;
            box-shadow: var(--shadow);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .highlight {
            color: var(--primary-color);
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        /* 关于部分 */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .about-text h2, .projects h2, .skills h2, .contact h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            position: relative;
        }

        .about-text h2:after, .projects h2:after, .skills h2:after, .contact h2:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 70px;
            height: 4px;
            background-color: var(--primary-color);
        }

        /* 项目部分 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .project-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .project-card:hover {
            transform: translateY(-10px);
        }

        .project-img {
            height: 200px;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .project-info {
            padding: 20px;
        }

        .project-info h3 {
            margin-bottom: 10px;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .tag {
            background-color: var(--primary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* 技能部分 */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        .skill-category {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .skill-category h3 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .skill-list {
            list-style: none;
        }

        .skill-list li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .skill-list i {
            color: var(--primary-color);
            margin-right: 10px;
        }

        /* 联系部分 */
        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .contact-item i {
            background-color: var(--primary-color);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .social-links {
            display: flex;
            margin-top: 20px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            margin-right: 15px;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-links a:hover {
            transform: translateY(-5px);
            background-color: var(--secondary-color);
        }

        /* 页脚 */
        footer {
            background-color: var(--card-bg);
            padding: 40px 0;
            text-align: center;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero, .about-content, .contact-content {
                flex-direction: column;
                grid-template-columns: 1fr;
            }
            
            .hero-content, .about-text {
                padding-right: 0;
                margin-bottom: 40px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .mobile-menu {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">Portfolio</div>
                <ul class="nav-links">
                    <li><a href="#home">首页</a></li>
                    <li><a href="#about">关于</a></li>
                    <li><a href="#projects">项目</a></li>
                    <li><a href="#skills">技能</a></li>
                    <li><a href="#contact">联系</a></li>
                </ul>
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <!-- 主内容区 -->
    <main>
        <!-- 首页部分 -->
        <section id="home" class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1>你好，我是 <span class="highlight">MoneyForever</span></h1>
                    <p>一名软件工程大一新生</p>
                    <a href="#projects" class="btn">查看我的项目</a>
                </div>
                <div class="hero-image">
                    <img src="https://github.com/lucky-money-account/picgo_resources_photos/blob/main/3730F2F48A973CB741FEE5D0A98ACFD6.jpg" alt="个人头像">
                </div>
            </div>
        </section>

        <!-- 关于部分 -->
        <section id="about">
            <div class="container">
                <div class="about-content">
                    <div class="about-text">
                        <h2>关于我</h2>
                        <p>电子科技大学软件学院大一学生</p>
                        <p>新手菜鸟，请多指教</p>
                        <a href="#" class="btn">下载简历</a>
                    </div>
                    <div class="about-stats">
                        <div class="stats">
                            <h3>0</h3>
                            <p>年开发经验</p>
                        </div>
                        <div class="stats">
                            <h3>0</h3>
                            <p>完成项目</p>
                        </div>
                        <div class="stats">
                            <h3>0</h3>
                            <p>技术栈</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 项目部分 -->
        <section id="projects">
            <div class="container">
                <div class="projects">
                    <h2>我的项目</h2>
                    
        <!-- 技能部分 -->
        <section id="skills">
            <div class="container">
                <div class="skills">
                    <h2>我的技能</h2>
                    <div class="skills-container">
                        <div class="skill-category">
                            <h3>工具与其他</h3>
                            <ul class="skill-list">
                                <li><i class="fas fa-check"></i> Git & GitHub</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 联系部分 -->
        <section id="contact">
            <div class="container">
                <div class="contact">
                    <h2>联系我</h2>
                    <div class="contact-content">
                        <div class="contact-info">
                            <p>如果您对我的工作感兴趣或有任何问题，请随时与我联系！</p>
                            <div class="contact-item">
                                <i class="fas fa-envelope"></i>
                                <div>
                                    <h3>邮箱</h3>
                                    <p>18148140820@163.com</p>
                                </div>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <div>
                                    <h3>地址</h3>
                                    <p>电子科技大学沙河校区</p>
                                </div>
                            </div>
                            <div class="social-links">
                                <a href="#"><i class="fab fa-github"></i></a>
                                <a href="#"><i class="fab fa-linkedin"></i></a>
                                <a href="#"><i class="fab fa-weibo"></i></a>
                            </div>
                        </div>
                        <div class="contact-form">
                            <form>
                                <input type="text" placeholder="您的姓名" required>
                                <input type="email" placeholder="您的邮箱" required>
                                <input type="text" placeholder="主题" required>
                                <textarea placeholder="您的消息" rows="5" required></textarea>
                                <button type="submit" class="btn">发送消息</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2025 moneyforever. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        // 主题切换功能
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
